leaderboard:
  top_n: 10

performance:
  max_samples: 500

simulator:
  # Scaled up because the seed list now covers ~60 Indy-metro places —
  # keeps per-district cadence comparable to the original 8-district setup.
  events_per_tick: 75
  tick_interval_ms: 200

cors:
  allow_origins:
    - "*"
