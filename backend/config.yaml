# Smart City Infrastructure Health Leaderboard — architecture config
# See Brainstrom ideas.docx: Kafka bus → stream worker → Redis (live) + Postgres (history)

server:
  host: "0.0.0.0"
  port: 8000

database:
  # Local hack: sqlite. Full stack (Docker): postgresql://app:app@postgres:5432/citylb
  url: "sqlite:///./data/leaderboard.db"

redis:
  url: "" # set REDIS_URL env in Docker, e.g. redis://redis:6379/0

kafka:
  bootstrap_servers: "localhost:19092"
  consumer_group: "uhs-stream-worker"
  # One topic per sensor family (matches brainstorm doc)
  topics:
    traffic: "sensor.traffic"
    aqi: "sensor.aqi"
    power: "sensor.power"
    water: "sensor.water"
    noise: "sensor.noise"
  cascade_topic: "city.cascade"

urban_health:
  # UHS weights (sum should be 1.0) — doc: traffic/air/power/water/noise
  weights:
    traffic: 0.25
    aqi: 0.30
    power: 0.20
    water: 0.10
    noise: 0.15
  aggregation_window_seconds: 5
  decay:
    # Blend new window score with previous published score (stability / pseudo time-decay)
    previous_blend: 0.15
  cascade:
    drop_threshold: 20.0
    neighbor_penalty: 12.0
    penalty_windows: 2

districts:
  # Indianapolis metro — inner neighborhoods, near-ring historic districts, the
  # outer townships, and the surrounding cities/towns.  The /add endpoint still
  # accepts arbitrary ids; these are the seed list the simulator feeds and the
