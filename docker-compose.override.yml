# Local run override:
# - Runs the pure-Python worker instead of the (build-heavy) Flink job.
# - Keeps redis/postgres internal-only to avoid clashing with other host services.
# - Exposes the API on 8010 (8000 is taken by another local project).
services:
  postgres:
    ports: !reset []
  redis:
    ports: !reset []
  api:
    ports: !override ["8010:8000"]

  worker:
    build: .
    command: ["python", "-m", "services.worker"]
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://app:app@postgres:5432/citylb
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
      redpanda-init:
        condition: service_completed_successfully
    restart: unless-stopped
